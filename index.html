            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && window.lucide.icons) {
                    // 將傳入的 trash-2 自動轉換成 CDN 看得懂的 Trash2 (PascalCase)
                    const pascalName = name.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join('');
                    const iconData = window.lucide.icons[pascalName] || window.lucide.icons[name];

                    if (Array.isArray(iconData)) {
                        const childrenHtml = iconData.map(c => {
                            const tag = c[0];
                            const attrs = c[1] || {};
                            const attrString = Object.entries(attrs).map(([k, v]) => `${k}="${v}"`).join(' ');
                            return `<${tag} ${attrString}></${tag}>`;
                        }).join('');
                        
                        const svgHtml = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}">${childrenHtml}</svg>`;
                        iconRef.current.innerHTML = svgHtml;
                    } else if (iconRef.current) {
                        // 防呆 X 標示
                        iconRef.current.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="${className}"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
                    }
                }
            }, [name, size, className]);
            return <span ref={iconRef} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }} {...props}></span>;
        };

                }
              ]
            }
          ]);
          const [activeScenarioId, setActiveScenarioId] = useState('s1');
          const [activePanel, setActivePanel] = useState(null); 
          const [newComment, setNewComment] = useState('');
          const [isSidebarOpen, setIsSidebarOpen] = useState(true); 
          const [isExportModalOpen, setIsExportModalOpen] = useState(false);
          const [isExporting, setIsExporting] = useState(false);
          const [deleteModal, setDeleteModal] = useState({ isOpen: false, title: '', message: '', onConfirm: null });

          const dragSourceRef = useRef(null); 
          const dragPayloadRef = useRef(null);
          const fileInputRef = useRef(null);

          const currentScenario = scenarios.find(s => s.id === activeScenarioId) || scenarios[0];
          const getAgentById = (id) => agentLibrary.find(a => a.id === id);
          const getCategoryById = (id) => categories.find(c => c.id === id);

          const handleExportJSON = () => {
            const exportData = { version: APP_VERSION, timestamp: new Date().toISOString(), agentLibrary, scenarios };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportData, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", `Advantech_Agent_Flow_${new Date().getTime()}.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
          };

          const handleImportJSON = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
              try {
                const importedData = JSON.parse(event.target.result);
                if (importedData.agentLibrary && importedData.scenarios) {
                  setAgentLibrary(importedData.agentLibrary);
                  setScenarios(importedData.scenarios);
                  setActiveScenarioId(importedData.scenarios[0]?.id || 's1');
                  alert(t.importSuccess);
                } else {
                  throw new Error("Invalid structure");
                }
              } catch (err) {
                console.error("Import Error:", err);
                alert(t.importError);
              }
              if (fileInputRef.current) fileInputRef.current.value = '';
            };
            reader.readAsText(file);
          };

          const handleExportPNG = async () => {
            if (!window.html2canvas) return;
            setIsExporting(true);
            setTimeout(async () => {
              try {
                const canvasElement = document.getElementById('export-canvas');
                if (!canvasElement) throw new Error("Canvas element not found");
                const canvas = await window.html2canvas(canvasElement, {
                  scale: 2, useCORS: true, backgroundColor: null, logging: false,
                  onclone: (clonedDoc) => {
                    const el = clonedDoc.getElementById('export-canvas');
                    if (el) { el.style.background = 'transparent'; el.style.padding = '40px'; }
                  }
                });
                const image = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.download = `Advantech_Architecture_${new Date().getTime()}.png`;
                link.href = image; link.click(); setIsExportModalOpen(false);
              } catch (err) { console.error("Export failed:", err); } finally { setIsExporting(false); }
            }, 500); 
          };

          const updateEntity = (type, id, field, value) => {
            if (type === 'agent') setAgentLibrary(agentLibrary.map(a => a.id === id ? { ...a, [field]: value } : a));
            else if (type === 'lane') setScenarios(scenarios.map(s => s.id === activeScenarioId ? { ...s, lanes: s.lanes.map(l => l.id === id ? { ...l, [field]: value } : l) } : s));
          };

          const handleAddComment = (type, id) => {
            if (!newComment.trim()) return;
            const commentObj = { text: newComment.trim(), date: new Date().toLocaleString() };
            if (type === 'agent') {
              const agent = getAgentById(id);
              updateEntity('agent', id, 'comments', [...(agent.comments || []), commentObj]);
            } else if (type === 'lane') {
              const lane = currentScenario.lanes.find(l => l.id === id);
              updateEntity('lane', id, 'comments', [...(lane.comments || []), commentObj]);
            }
            setNewComment('');
          };

          const handleAddTag = (agentId, tag) => {
            if (!tag.trim()) return;
            setAgentLibrary(prev => prev.map(a => {
              if (a.id === agentId) {
                const currentTags = a.tags || [];
                if (!currentTags.includes(tag.trim())) return { ...a, tags: [...currentTags, tag.trim()] };
              }
              return a;
            }));
          };

          const handleRemoveTag = (agentId, tagToRemove) => {
            setAgentLibrary(prev => prev.map(a => {
              if (a.id === agentId) return { ...a, tags: (a.tags || []).filter(t => t !== tagToRemove) };
              return a;
            }));
          };

          const removeAgentFromAllLanes = (agentId) => {
            setScenarios(prev => prev.map(s => {
              if (s.id !== activeScenarioId) return s;
              return {
                ...s, lanes: s.lanes.map(l => {
                  const newNodes = [];
                  l.nodes.forEach(node => {
                    if (typeof node === 'string') {
                      if (node !== agentId) newNodes.push(node);
                    } else if (node.type === 'horizontal') {
                      newNodes.push({
                        ...node,
                        inputs: node.inputs ? node.inputs.filter(id => id !== agentId) : undefined,
                        target: node.target === agentId ? null : node.target,
                        source: node.source === agentId ? null : node.source,
                        outputs: node.outputs ? node.outputs.filter(id => id !== agentId) : undefined
                      });
                    } else if (node.type === 'vertical') {
                      newNodes.push({ ...node, items: node.items ? node.items.filter(id => id !== agentId) : [] });
                    }
                  });
                  return { ...l, nodes: newNodes };
                })
              };
            }));
          };

          const initiateDeleteAgent = (agentId) => {
            setDeleteModal({ isOpen: true, title: t.deleteAgent, message: t.confirmDeleteAgent,
              onConfirm: () => {
                removeAgentFromAllLanes(agentId);
                setAgentLibrary(prev => prev.filter(a => a.id !== agentId));
                setActivePanel(null); setDeleteModal(prev => ({ ...prev, isOpen: false }));
              }
            });
          };

          const initiateDeleteLane = (laneId) => {
            setDeleteModal({ isOpen: true, title: t.deletePhase, message: t.confirmDeletePhase,
              onConfirm: () => {
                setScenarios(prev => prev.map(s => s.id === activeScenarioId ? { ...s, lanes: s.lanes.filter(l => l.id !== laneId) } : s));
                setActivePanel(null); setDeleteModal(prev => ({ ...prev, isOpen: false }));
              }
            });
          };

          const handleDeleteGroup = (laneId, groupId) => {
            setDeleteModal({ isOpen: true, title: t.deleteGroup, message: t.confirmAction,
              onConfirm: () => {
                setScenarios(prev => prev.map(s => s.id === activeScenarioId ? {
                  ...s, lanes: s.lanes.map(l => l.id === laneId ? { ...l, nodes: l.nodes.filter(n => typeof n === 'string' || n.id !== groupId) } : l)
                } : s));
                setDeleteModal(prev => ({ ...prev, isOpen: false }));
              }
            });
          };

          const handleCreateScenario = () => {
            const newId = `s${Date.now()}`;
            setScenarios([...scenarios, { id: newId, name: { zh: `${t.newFlow} ${scenarios.length + 1}`, en: `${t.newFlow} ${scenarios.length + 1}` }, lanes: [{ id: `l_${Date.now()}`, name: { zh: t.defaultPhaseName, en: t.defaultPhaseName }, theme: 'slate', nodes: [], comments: [] }] }]);
            setActiveScenarioId(newId); setActivePanel(null);
          };

          const handleCreateLane = () => {
            const newLaneId = `l_${Date.now()}`;
            setScenarios(scenarios.map(s => s.id === activeScenarioId ? { ...s, lanes: [...s.lanes, { id: newLaneId, name: { zh: t.defaultPhaseName, en: t.defaultPhaseName }, theme: 'slate', nodes: [], comments: [] }] } : s));
            setActivePanel({ type: 'lane', id: newLaneId });
          };

          const handleCreateNto1 = (laneId) => {
            const newGroup = { id: `hg_${Date.now()}`, type: 'horizontal', mode: 'n-to-1', direction: 'ltr', inputs: [], target: null };
            setScenarios(scenarios.map(s => s.id === activeScenarioId ? { ...s, lanes: s.lanes.map(l => l.id === laneId ? { ...l, nodes: [...l.nodes, newGroup] } : l) } : s));
          };

          const handleCreate1toN = (laneId) => {
            const newGroup = { id: `hg_${Date.now()}`, type: 'horizontal', mode: '1-to-n', direction: 'ltr', source: null, outputs: [] };
            setScenarios(scenarios.map(s => s.id === activeScenarioId ? { ...s, lanes: s.lanes.map(l => l.id === laneId ? { ...l, nodes: [...l.nodes, newGroup] } : l) } : s));
          };

          const handleCreateVertical = (laneId) => {
            const newGroup = { id: `vg_${Date.now()}`, type: 'vertical', items: [], direction: 'down' };
            setScenarios(scenarios.map(s => s.id === activeScenarioId ? { ...s, lanes: s.lanes.map(l => l.id === laneId ? { ...l, nodes: [...l.nodes, newGroup] } : l) } : s));
          };

          const toggleVerticalGroupDir = (laneId, groupId) => {
            setScenarios(scenarios.map(s => s.id === activeScenarioId ? {
              ...s, lanes: s.lanes.map(l => l.id === laneId ? {
                ...l, nodes: l.nodes.map(n => typeof n === 'object' && n.id === groupId && n.type === 'vertical' ? { ...n, direction: n.direction === 'up' ? 'down' : 'up' } : n)
              } : l)
            } : s));
          };

          const toggleHorizontalDir = (laneId, groupId) => {
            setScenarios(scenarios.map(s => s.id === activeScenarioId ? {
              ...s, lanes: s.lanes.map(l => l.id === laneId ? {
                ...l, nodes: l.nodes.map(n => typeof n === 'object' && n.id === groupId && n.type === 'horizontal' ? { ...n, direction: n.direction === 'rtl' ? 'ltr' : 'rtl' } : n)
              } : l)
            } : s));
          };

          const handleCreateAgent = (categoryId) => {
            const newAgent = { id: `a_${Date.now()}`, categoryId, name: { zh: t.defaultAgentName, en: t.defaultAgentName }, subtitle: { zh: t.defaultAgentDesc, en: t.defaultAgentDesc }, mode: 'ai-only', tags: [], comments: [] };
            setAgentLibrary([...agentLibrary, newAgent]); setActivePanel({ type: 'agent', id: newAgent.id });
          };

          const onDragStart = (e, source, payload) => {
            dragSourceRef.current = source; dragPayloadRef.current = payload; e.dataTransfer.effectAllowed = 'move';
          };

          const handleDrop = (e, targetZoneId) => {
            e.preventDefault(); e.stopPropagation(); 
            const agentId = dragPayloadRef.current;
            if (!agentId || !targetZoneId) return;

            setScenarios(prev => {
              let nextScenarios = prev.map(s => {
                if (s.id !== activeScenarioId) return s;
                return {
                  ...s, lanes: s.lanes.map(l => {
                    const newNodes = [];
                    l.nodes.forEach(node => {
                      if (typeof node === 'string') {
                        if (node !== agentId) newNodes.push(node);
                      } else if (node.type === 'horizontal') {
                        newNodes.push({
                          ...node,
                          inputs: node.inputs ? node.inputs.filter(id => id !== agentId) : undefined,
                          target: node.target === agentId ? null : node.target,
                          source: node.source === agentId ? null : node.source,
                          outputs: node.outputs ? node.outputs.filter(id => id !== agentId) : undefined
                        });
                      } else if (node.type === 'vertical') {
                        newNodes.push({ ...node, items: node.items ? node.items.filter(id => id !== agentId) : [] });
                      }
                    });
                    return { ...l, nodes: newNodes };
                  })
                };
              });

              nextScenarios = nextScenarios.map(s => {
                if (s.id !== activeScenarioId) return s;
                let newLanes = [...s.lanes];

                if (targetZoneId.startsWith('lane_')) {
                  newLanes = newLanes.map(l => l.id === targetZoneId ? { ...l, nodes: [...l.nodes, agentId] } : l);
                } else {
                  let zoneType = ''; let groupId = '';
                  if (targetZoneId.endsWith('_inputs')) { zoneType = 'inputs'; groupId = targetZoneId.replace('_inputs', ''); }
                  else if (targetZoneId.endsWith('_outputs')) { zoneType = 'outputs'; groupId = targetZoneId.replace('_outputs', ''); }
                  else if (targetZoneId.endsWith('_target')) { zoneType = 'target'; groupId = targetZoneId.replace('_target', ''); }
                  else if (targetZoneId.endsWith('_source')) { zoneType = 'source'; groupId = targetZoneId.replace('_source', ''); }
                  else if (targetZoneId.endsWith('_v_append')) { zoneType = 'v_append'; groupId = targetZoneId.replace('_v_append', ''); }

                  newLanes = newLanes.map(l => {
                    const updatedNodes = l.nodes.map(node => {
                      if (typeof node === 'object' && node.id === groupId) {
                        if (zoneType === 'inputs') return { ...node, inputs: [...(node.inputs || []), agentId] };
                        if (zoneType === 'outputs') return { ...node, outputs: [...(node.outputs || []), agentId] };
                        if (zoneType === 'target') return { ...node, target: agentId };
                        if (zoneType === 'source') return { ...node, source: agentId };
                        if (zoneType === 'v_append') return { ...node, items: [...(node.items || []), agentId] };
                      }
                      return node;
                    });
                    return { ...l, nodes: updatedNodes };
                  });
                }
                return { ...s, lanes: newLanes };
              });
              return nextScenarios;
            });
            dragSourceRef.current = null;
          };

          const AgentIcon = ({ mode }) => {
            const common = "w-10 h-10 rounded-full flex items-center justify-center shadow-lg border text-white transition-all ring-2 ring-white";
            if (mode === 'human-only') return <div className="mr-4 shrink-0 mt-0.5"><div className={`${common} bg-emerald-600 border-emerald-700`}><User size={18} /></div></div>;
            return (
              <div className="flex shrink-0 -space-x-4 mr-4 mt-0.5 items-center">
                <div className={`relative z-20 ${common} bg-blue-600 border-blue-700 shadow-blue-900/10`}><Bot size={18} /></div>
                {mode === 'human-ai' && <div className={`relative z-10 ${common} bg-orange-500 border-orange-600 shadow-orange-900/10`}><User size={18} /></div>}
              </div>
            );
          };

          const renderAgentCard = (agentId, laneId, isInsideGroup = false) => {
            const agent = getAgentById(agentId);
            if (!agent) return null;
            const aTheme = THEME_MAP[getCategoryById(agent.categoryId)?.theme || 'slate'];
            
            return (
              <div 
                key={agentId} 
                draggable 
                onDragStart={e => onDragStart(e, `canvas_${laneId}`, agentId)}
                onDragOver={e => { e.preventDefault(); e.stopPropagation(); }} 
                onDrop={e => { e.preventDefault(); e.stopPropagation(); }}
                onClick={(e) => { e.stopPropagation(); setActivePanel({type:'agent',id:agentId}); }} 
                className={`group relative p-4 ${aTheme.cardBg} border ${aTheme.cardBorder} rounded-2xl shadow-sm hover:shadow-xl cursor-pointer transition-all border-l-4 ${aTheme.border.replace('bg-', 'border-')} flex items-start overflow-visible w-full bg-white/95 ${!isInsideGroup ? 'mb-6 w-80' : 'mb-3 last:mb-0 min-w-[280px]'}`}
              >
                <AgentIcon mode={agent.mode} />
                <div className="flex-1 min-w-0 flex flex-col justify-center relative z-10">
                  <div className="flex items-start justify-between">
                    <div className={`font-extrabold text-[14px] ${aTheme.cardText} leading-[1.3] break-words flex-1 pr-2`}>{getLoc(agent.name, lang)}</div>
                  </div>
                  <div className={`text-[11px] font-semibold opacity-60 ${aTheme.cardText} leading-relaxed mt-1 break-words`}>{getLoc(agent.subtitle, lang)}</div>
                  {agent.tags && agent.tags.length > 0 && (
                    <div className="flex flex-wrap gap-1.5 mt-2.5">
                      {agent.tags.map((tag, idx) => (
                        <span key={idx} className={`text-[9px] font-bold px-1.5 py-0.5 rounded-md ${aTheme.tagBg} ${aTheme.tagText} border ${aTheme.cardBorder}`}>{tag}</span>
                      ))}
                    </div>
                  )}
                </div>
                <button onClick={(e) => { e.stopPropagation(); removeAgentFromAllLanes(agentId); }} className="absolute top-2 right-2 p-2 bg-white/90 border border-slate-200 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-full transition-all shadow-sm z-20">
                  <Trash2 size={14}/>
                </button>
              </div>
            );
          };

          const renderDropzone = (zoneId, text) => (
            <div 
              onDragOver={e => { e.preventDefault(); e.stopPropagation(); }} 
              onDrop={e => handleDrop(e, zoneId)} 
              className="w-full min-h-[70px] min-w-[280px] flex items-center justify-center rounded-2xl border-2 border-dashed border-slate-300 bg-white/50 text-[11px] text-slate-400 font-bold hover:bg-blue-50 hover:border-blue-300 hover:text-blue-500 transition-colors cursor-crosshair mb-3 last:mb-0"
            >{text}</div>
          );

          return (
            <div className="flex flex-col h-screen w-full bg-[#f8f9fb] text-slate-800 overflow-hidden font-sans">
              <nav className="h-14 bg-white border-b border-slate-200 flex justify-between items-center px-4 z-40 relative shadow-sm">
                <div className="flex items-center space-x-4">
                  <div className="flex items-center space-x-2">
                    <div className="w-6 h-6 bg-[#004098] rounded-md flex items-center justify-center text-white"><Layers size={14} /></div>
                    <div className="flex flex-col">
                      <span className="text-sm font-bold tracking-tight leading-tight">{t.appTitle}</span>
                      <div className="flex items-center space-x-2">
                        <span className="text-[9px] font-bold text-slate-400 leading-none">{APP_VERSION}</span>
                        <span className="text-[9px] text-slate-300 font-medium">|</span>
                        <span className="text-[9px] font-semibold text-slate-400 italic leading-none">{APP_UPDATE_NOTE}</span>
                      </div>
                    </div>
                  </div>
                  <div className="h-4 w-px bg-slate-300"></div>
                  <div className="flex items-center space-x-3">
                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">{t.flow}</span>
                    <button onClick={() => setActivePanel({ type: 'scenario', id: activeScenarioId })} className="bg-slate-50 border border-slate-200 hover:border-[#004098] text-sm font-bold px-3 py-1.5 rounded-md flex items-center transition-all">
                      <span className="truncate max-w-[200px]">{getLoc(currentScenario.name, lang)}</span>
                      <Edit3 size={12} className="ml-2 text-slate-400" />
                    </button>
                    <select value={activeScenarioId} onChange={(e) => setActiveScenarioId(e.target.value)} className="text-xs text-slate-400 bg-transparent border-none cursor-pointer outline-none">
                      {scenarios.map(s => <option key={s.id} value={s.id}>{t.switchFlow} {getLoc(s.name, lang)}</option>)}
                    </select>
                  </div>
                </div>
                
                <div className="flex items-center space-x-2">
                  <button onClick={() => setLang(lang === 'zh' ? 'en' : 'zh')} className="flex items-center text-[10px] font-bold text-slate-500 px-3 py-1.5 bg-slate-100 rounded-lg hover:bg-slate-200 transition-colors mr-2">
                    <Languages size={14} className="mr-1.5" /> {lang === 'zh' ? 'EN' : '中文'}
                  </button>
                  <div className="flex items-center bg-slate-100 p-1 rounded-lg">
                    <label className="flex items-center text-xs font-bold text-slate-600 px-3 py-1.5 hover:bg-white hover:shadow-sm rounded-md transition-all cursor-pointer">
                      <Upload size={14} className="mr-1.5" /> {t.importJson}
                      <input type="file" accept=".json" onChange={handleImportJSON} ref={fileInputRef} className="hidden" />
                    </label>
                    <button onClick={handleExportJSON} className="flex items-center text-xs font-bold text-slate-600 px-3 py-1.5 hover:bg-white hover:shadow-sm rounded-md transition-all">
                      <FileJson size={14} className="mr-1.5" /> {t.exportJson}
                    </button>
                  </div>
                  <button onClick={() => setIsExportModalOpen(true)} className="px-5 py-2 ml-2 bg-[#004098] text-white rounded-lg text-xs font-bold hover:bg-blue-800 shadow-md flex items-center transition-all">
                    <Download size={14} className="mr-2" /> {t.export}
                  </button>
                </div>
              </nav>

              <div className="flex-1 flex overflow-hidden">
                <aside className={`relative bg-white h-full transition-all duration-300 ${isSidebarOpen ? 'w-72 border-r' : 'w-0'} overflow-hidden shrink-0 z-30`}>
                  <div className="w-72 flex flex-col h-full overflow-hidden">
                    <header className="p-4 border-b flex justify-between items-center bg-slate-50/50">
                      <h2 className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">{t.agentLib}</h2>
                      <button onClick={() => setIsSidebarOpen(false)} className="hover:bg-slate-200 p-1 rounded-md transition-colors"><PanelLeftClose size={16} className="text-slate-400" /></button>
                    </header>
                    <div className="flex-1 overflow-y-auto p-4 space-y-8 no-scrollbar">
                      {categories.map(cat => {
                        const agents = agentLibrary.filter(a => a.categoryId === cat.id);
                        const theme = THEME_MAP[cat.theme];
                        return (
                          <div key={cat.id}>
                            <div className="flex items-center justify-between mb-4 text-[11px] font-bold text-slate-500">
                              <div className="flex items-center space-x-2"><div className={`w-2 h-2 rounded-sm ${theme.bg}`} /><span>{getLoc(cat.name, lang)}</span></div>
                            </div>
                            <div className="space-y-3">
                              {agents.map(a => (
                                <div key={a.id} draggable onDragStart={e => onDragStart(e, 'library', a.id)} onClick={() => setActivePanel({type:'agent',id:a.id})} className={`p-4 border ${theme.cardBg} ${theme.cardBorder} rounded-xl cursor-grab hover:shadow-lg transition-all flex items-center relative border-l-4 ${theme.border.replace('bg-', 'border-')} overflow-hidden`}>
                                  <AgentIcon mode={a.mode} />
                                  <div className="flex-1 min-w-0 pr-6">
                                    <div className={`font-bold text-[13px] ${theme.cardText} truncate`}>{getLoc(a.name, lang)}</div>
                                    {a.tags && a.tags.length > 0 && (
                                      <div className="flex gap-1 mt-1 overflow-hidden">
                                        {a.tags.slice(0, 2).map((tag, idx) => <span key={idx} className={`text-[8px] font-bold px-1 py-0.5 rounded ${theme.tagBg} ${theme.tagText} truncate max-w-[50px]`}>{tag}</span>)}
                                        {a.tags.length > 2 && <span className={`text-[8px] font-bold px-1 py-0.5 rounded ${theme.tagBg} ${theme.tagText}`}>+{a.tags.length-2}</span>}
                                      </div>
                                    )}
                                  </div>
                                  <GripVertical size={14} className="absolute right-2 text-slate-300 opacity-0 group-hover:opacity-100 transition-opacity" />
                                </div>
                              ))}
                              <button onClick={() => handleCreateAgent(cat.id)} className="w-full py-2 border border-dashed border-slate-200 text-[10px] font-bold text-slate-400 rounded-xl hover:bg-slate-50 transition-colors">+ {t.addAgent}</button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </aside>

                <aside className={`relative bg-white h-full shadow-2xl transition-all duration-300 ${activePanel ? 'w-80 border-r' : 'w-0'} overflow-hidden shrink-0 z-40`}>
                  {activePanel && (
                    <div className="w-80 flex flex-col h-full">
                      <header className="p-4 border-b flex justify-between items-center bg-slate-50/50">
                        <h2 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">
                          {activePanel.type === 'agent' ? t.settingsTitleAgent : activePanel.type === 'lane' ? t.settingsTitleLane : t.settingsTitleScenario}
                        </h2>
                        <div className="flex space-x-2">
                          {(activePanel.type === 'agent' || activePanel.type === 'lane') && (
                            <button onClick={() => activePanel.type === 'agent' ? initiateDeleteAgent(activePanel.id) : initiateDeleteLane(activePanel.id)} className="p-1.5 bg-red-50 text-red-500 hover:bg-red-500 hover:text-white rounded-md transition-all">
                              <Trash2 size={16} />
                            </button>
                          )}
                          <button onClick={() => setActivePanel(null)} className="p-1.5 hover:bg-slate-100 rounded-md transition-all"><X size={16} /></button>
                        </div>
                      </header>
                      <div className="flex-1 overflow-y-auto p-6 space-y-8 no-scrollbar">
                        {activePanel.type === 'agent' && (() => {
                          const agent = getAgentById(activePanel.id);
                          if (!agent) return null;
                          const catTheme = THEME_MAP[getCategoryById(agent.categoryId)?.theme || 'slate'];
                          
                          return (
                            <div className="space-y-6">
                              <div><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{t.agentName}</label>
                              <input value={getLoc(agent.name, lang)} onChange={e => updateEntity('agent', agent.id, 'name', e.target.value)} className="w-full mt-2 p-3 border border-slate-200 rounded-xl font-bold text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all" /></div>
                              <div><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{t.agentDesc}</label>
                              <textarea value={getLoc(agent.subtitle, lang)} onChange={e => updateEntity('agent', agent.id, 'subtitle', e.target.value)} className="w-full mt-2 p-3 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-blue-500 outline-none transition-all resize-none" rows="3" /></div>
                              
                              <div className="pt-2">
                                <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center"><Tag size={12} className="mr-1.5"/> {t.tags}</label>
                                <div className="flex flex-wrap gap-2 mb-3">
                                  {(agent.tags || []).map((tag, idx) => (
                                    <span key={idx} className={`inline-flex items-center text-[10px] font-bold px-2 py-1 rounded-md ${catTheme.tagBg} ${catTheme.tagText} border ${catTheme.cardBorder}`}>
                                      {tag}
                                      <button onClick={() => handleRemoveTag(agent.id, tag)} className="ml-1.5 hover:text-red-500 transition-colors"><X size={10} /></button>
                                    </span>
                                  ))}
                                </div>
                                <input 
                                  type="text" placeholder={t.addTagPlaceholder}
                                  onKeyDown={(e) => { if(e.key === 'Enter') { handleAddTag(agent.id, e.target.value); e.target.value = ''; } }}
                                  className="w-full p-2.5 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-blue-500 outline-none transition-all bg-slate-50" 
                                />
                              </div>

                              <div className="pt-2"><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{t.mode}</label>
                                <div className="mt-3 space-y-2 bg-slate-50 p-2 rounded-2xl border border-slate-100">
                                  {['ai-only', 'human-ai', 'human-only'].map(m => (
                                    <button key={m} onClick={() => updateEntity('agent', agent.id, 'mode', m)} className={`w-full py-2.5 text-[11px] font-bold rounded-xl transition-all ${agent.mode === m ? 'bg-white text-blue-600 shadow-md ring-1 ring-slate-200' : 'text-slate-500 hover:bg-slate-200'}`}>
                                      {m === 'ai-only' ? t.aiOnly : m === 'human-ai' ? t.humanAi : t.humanOnly}
                                    </button>
                                  ))}
                                </div>
                              </div>

                              <div className="pt-4 border-t border-slate-100">
                                <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center"><MessageCircle size={12} className="mr-1.5"/> {t.feedback}</label>
                                <div className="space-y-3 mb-3 max-h-40 overflow-y-auto no-scrollbar">
                                  {(!agent.comments || agent.comments.length === 0) ? (
                                    <div className="text-xs text-slate-400 italic">{t.noComments}</div>
                                  ) : (
                                    agent.comments.map((c, i) => (
                                      <div key={i} className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                        <div className="text-xs text-slate-700">{c.text}</div>
                                        <div className="text-[9px] text-slate-400 mt-1.5">{c.date}</div>
                                      </div>
                                    ))
                                  )}
                                </div>
                                <input type="text" value={newComment} onChange={e => setNewComment(e.target.value)} onKeyDown={e => { if(e.key === 'Enter') { handleAddComment('agent', agent.id); } }} placeholder={t.typeFeedback} className="w-full p-2.5 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-blue-500 outline-none transition-all bg-white" />
                              </div>
                            </div>
                          );
                        })()}
                        {activePanel.type === 'lane' && (() => {
                          const lane = currentScenario.lanes.find(l => l.id === activePanel.id);
                          if (!lane) return null;
                          return (
                            <div className="space-y-6">
                              <div><label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{t.phaseName}</label>
                              <input value={getLoc(lane.name, lang)} onChange={e => updateEntity('lane', lane.id, 'name', e.target.value)} className="w-full mt-2 p-3 border border-slate-200 rounded-xl font-bold text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all" /></div>
                              
                              <div className="pt-4 border-t border-slate-100">
                                <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center"><MessageCircle size={12} className="mr-1.5"/> {t.feedback}</label>
                                <div className="space-y-3 mb-3 max-h-40 overflow-y-auto no-scrollbar">
                                  {(!lane.comments || lane.comments.length === 0) ? (
                                    <div className="text-xs text-slate-400 italic">{t.noComments}</div>
                                  ) : (
                                    lane.comments.map((c, i) => (
                                      <div key={i} className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                        <div className="text-xs text-slate-700">{c.text}</div>
                                        <div className="text-[9px] text-slate-400 mt-1.5">{c.date}</div>
                                      </div>
                                    ))
                                  )}
                                </div>
                                <input type="text" value={newComment} onChange={e => setNewComment(e.target.value)} onKeyDown={e => { if(e.key === 'Enter') { handleAddComment('lane', lane.id); } }} placeholder={t.typeFeedback} className="w-full p-2.5 border border-slate-200 rounded-xl text-xs focus:ring-2 focus:ring-blue-500 outline-none transition-all bg-white" />
                              </div>
                            </div>
                          );
                        })()}
                      </div>
                    </div>
                  )}
                </aside>

                <main className="flex-1 min-w-0 relative bg-[#f1f4f8] overflow-auto p-12 flex justify-center items-start no-scrollbar">
                  <div className="absolute inset-0 pointer-events-none opacity-20" style={{ backgroundImage: 'radial-gradient(#1e293b 1px, transparent 1px)', backgroundSize: '32px 32px' }}></div>
                  {!isSidebarOpen && (
                    <button onClick={() => setIsSidebarOpen(true)} className="absolute left-0 top-6 bg-white border border-l-0 p-3 rounded-r-xl shadow-lg text-slate-400 hover:text-blue-600 transition-all z-20">
                      <PanelLeft size={18} />
                    </button>
                  )}
                  
                  <div id="export-canvas" className="flex space-x-12 pb-32 pl-8"> 
                    {currentScenario.lanes.map((lane, idx) => {
                      const theme = THEME_MAP[lane.theme] || THEME_MAP.slate;
                      return (
                        <div key={lane.id} className="relative shrink-0 flex flex-col group/lane w-max min-w-[360px]">
                          <div onClick={() => setActivePanel({type:'lane', id:lane.id})} className={`px-6 py-5 ${theme.bg} text-white rounded-t-[24px] flex justify-between items-center cursor-pointer hover:shadow-xl transition-all relative z-10 shadow-lg`}>
                            <div className="flex items-center">
                              <div className="w-6 h-6 bg-white/20 rounded-md flex items-center justify-center text-[11px] mr-4 font-bold border border-white/30 backdrop-blur-sm shadow-sm">{idx + 1}</div>
                              <span className="font-extrabold text-[13px] uppercase tracking-wider">{getLoc(lane.name, lang)}</span>
                            </div>
                          </div>
                          <div onDragOver={e => { e.preventDefault(); e.stopPropagation(); }} onDrop={e => handleDrop(e, `lane_${lane.id}`)} className="flex-1 p-6 bg-white/80 backdrop-blur-lg border-x border-b border-slate-200/40 rounded-b-[24px] min-h-[600px] flex flex-col shadow-2xl shadow-slate-200/50">
                            {lane.nodes.map((node) => {
                              if (typeof node === 'string') return renderAgentCard(node, lane.id);
                              else if (typeof node === 'object' && node.type === 'horizontal') {
                                const isRtl = node.direction === 'rtl';
                                return (
                                  <div key={node.id} className="relative w-max p-4 mb-6 border-2 border-dashed border-slate-300 bg-slate-50/70 rounded-3xl flex items-center justify-center group/hg">
                                    <button onClick={(e) => { e.stopPropagation(); handleDeleteGroup(lane.id, node.id); }} className="absolute top-3 right-3 p-1.5 bg-white/90 border border-slate-200 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg shadow-sm transition-all z-20"><Trash2 size={14}/></button>
                                    
                                    <div className={`flex items-stretch ${isRtl ? 'flex-row-reverse' : 'flex-row'}`}>
                                      <div className="flex flex-col z-10 min-w-[280px]">
                                        {node.inputs && node.inputs.map(id => renderAgentCard(id, lane.id, true))}
                                        {renderDropzone(`${node.id}_inputs`, t.dropInputs)}
                                      </div>
                                      <div className="w-24 flex flex-col items-center justify-center shrink-0 relative z-10 mx-2">
                                        {isRtl ? <ArrowLeft size={32} className="text-slate-300" /> : <ArrowRight size={32} className="text-slate-300" />}
                                        <button onClick={() => toggleHorizontalDir(lane.id, node.id)} className="flex items-center space-x-1 text-[9px] font-bold text-slate-400 hover:text-blue-500 mt-2 bg-white px-2 py-1 rounded-full border shadow-sm transition-colors"><ArrowRightLeft size={10}/> <span>{t.switchDir}</span></button>
                                      </div>
                                      <div className="flex flex-col justify-center z-10 min-w-[280px]">
                                        {node.target ? renderAgentCard(node.target, lane.id, true) : renderDropzone(`${node.id}_target`, t.dropTarget)}
                                      </div>
                                    </div>
                                  </div>
                                );
                              }
                              else if (typeof node === 'object' && node.type === 'vertical') {
                                return (
                                  <div key={node.id} className="relative w-full p-4 mb-6 border-2 border-dashed border-slate-300 bg-slate-50/70 rounded-3xl flex flex-col items-center group/vg">
                                    <button onClick={(e) => { e.stopPropagation(); handleDeleteGroup(lane.id, node.id); }} className="absolute top-3 right-3 p-1.5 bg-white/90 border border-slate-200 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg shadow-sm transition-all z-20"><Trash2 size={14}/></button>
                                    
                                    <div className="flex flex-col items-center w-full z-10">
                                      {(node.items || []).map((agentId, i) => (
                                        <Fragment key={agentId}>
                                          {i > 0 && (
                                            <div className="py-2 flex flex-col items-center relative z-10">
                                              <div className="w-px h-6 bg-slate-400 relative">
                                                 {node.direction === 'down' ? <div className="absolute bottom-[-3px] left-1/2 -translate-x-1/2 w-0 h-0 border-l-[5px] border-l-transparent border-r-[5px] border-r-transparent border-t-[6px] border-t-slate-400"></div> : <div className="absolute top-[-3px] left-1/2 -translate-x-1/2 w-0 h-0 border-l-[5px] border-l-transparent border-r-[5px] border-r-transparent border-b-[6px] border-b-slate-400"></div>}
                                              </div>
                                            </div>
                                          )}
                                          {renderAgentCard(agentId, lane.id, true)}
                                        </Fragment>
                                      ))}
                                    </div>
                                    {(node.items && node.items.length >= 2) && (
                                      <button onClick={() => toggleVerticalGroupDir(lane.id, node.id)} className="flex items-center space-x-1 text-[9px] font-bold text-slate-400 hover:text-blue-500 mt-4 mb-1 bg-white px-3 py-1.5 rounded-full border shadow-sm transition-colors relative z-10">
                                        {node.direction === 'down' ? <ArrowDown size={10}/> : <ArrowUp size={10}/>} <span>{t.switchDir}</span>
                                      </button>
                                    )}
                                    <div className="mt-3 w-full relative z-10">
                                      {renderDropzone(`${node.id}_v_append`, t.dropInputs)}
                                    </div>
                                  </div>
                                );
                              }
                              return null;
                            })}
                            
                            {lane.nodes.length === 0 && (
                              <div className="flex-1 min-h-[100px] border-2 border-dashed border-slate-200/60 rounded-[20px] flex items-center justify-center text-slate-300 text-[11px] font-extrabold uppercase p-10 text-center leading-loose mb-6">
                                {t.dragHere}
                              </div>
                            )}
                            
                            <div className="flex flex-col space-y-2 mt-auto pt-6 border-t border-slate-100">
                               <button onClick={handleCreateLane} className="w-full h-10 border-2 border-dashed border-slate-300/60 rounded-xl flex items-center justify-center text-slate-400 hover:text-blue-600 hover:border-blue-400 transition-all bg-white/50"><Plus size={16}/> <span className="text-[11px] font-bold ml-1 uppercase">{t.addPhase}</span></button>
                               <div className="flex space-x-2">
                                 <button onClick={() => handleCreateNto1(lane.id)} className="flex-1 h-9 border border-slate-200 rounded-lg flex items-center justify-center text-slate-500 hover:bg-blue-50 transition-all bg-white"><GitMerge size={14} className="mr-1.5"/> <span className="text-[10px] font-bold">{t.addNto1}</span></button>
                                 <button onClick={() => handleCreate1toN(lane.id)} className="flex-1 h-9 border border-slate-200 rounded-lg flex items-center justify-center text-slate-500 hover:bg-orange-50 transition-all bg-white"><GitBranch size={14} className="mr-1.5"/> <span className="text-[10px] font-bold">{t.add1toN}</span></button>
                                 <button onClick={() => handleCreateVertical(lane.id)} className="flex-1 h-9 border border-slate-200 rounded-lg flex items-center justify-center text-slate-500 hover:bg-green-50 transition-all bg-white"><ArrowDownUp size={14} className="mr-1.5"/> <span className="text-[10px] font-bold">{t.addVertical}</span></button>
                               </div>
                            </div>
                          </div>
                          {idx < currentScenario.lanes.length - 1 && <div className="absolute top-[280px] -right-[24px] translate-x-1/2 z-10 flex items-center justify-center w-10 h-10 bg-white border-4 border-[#f1f4f8] rounded-full shadow-sm text-slate-300 pointer-events-none" data-html2canvas-ignore="true"><ArrowRight size={20} className="stroke-[3]" /></div>}
                        </div>
                      );
                    })}
                    <button onClick={handleCreateLane} className="w-14 h-14 mt-4 border-2 border-dashed border-slate-300/60 rounded-[20px] flex items-center justify-center text-slate-300 hover:text-blue-500 hover:border-blue-500 transition-all shadow-md bg-white/50 backdrop-blur-sm" data-html2canvas-ignore="true"><Plus size={32}/></button>
                  </div>
                </main>
              </div>

              {isExportModalOpen && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-xl z-50 flex items-center justify-center p-6">
                  <div className="bg-white rounded-[32px] shadow-2xl w-full max-w-lg p-12 text-center border border-slate-100">
                    {isExporting ? <div className="py-12"><div className="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto mb-8" /><h2 className="text-2xl font-black text-slate-800">Generating PNG...</h2></div> : <>
                        <div className="w-24 h-24 bg-blue-50 text-blue-600 rounded-[32px] flex items-center justify-center mx-auto mb-10 shadow-inner ring-4 ring-white"><Download size={48}/></div>
                        <h2 className="text-3xl font-black text-slate-900 mb-4">{t.export}</h2><p className="text-sm text-slate-500 mb-12">{t.exportDesc}</p>
                        <div className="flex justify-center space-x-5"><button onClick={() => setIsExportModalOpen(false)} className="px-10 py-4 bg-slate-100 text-slate-700 rounded-2xl font-black">CLOSE</button><button onClick={handleExportPNG} className="px-10 py-4 bg-[#004098] text-white rounded-2xl font-black shadow-2xl flex items-center"><Download size={22} className="mr-3"/>DOWNLOAD</button></div>
                      </>}
                  </div>
                </div>
              )}

              {deleteModal.isOpen && (
                <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[100] flex items-center justify-center p-6">
                  <div className="bg-white rounded-[24px] shadow-2xl w-full max-w-sm p-8 border border-slate-100">
                    <div className="w-12 h-12 bg-red-50 text-red-500 rounded-xl flex items-center justify-center mb-6"><AlertTriangle size={24} /></div>
                    <h2 className="text-xl font-bold text-slate-900 mb-2">{deleteModal.title}</h2><p className="text-sm text-slate-500 mb-8">{deleteModal.message}</p><div className="flex space-x-3"><button onClick={() => setDeleteModal(prev => ({ ...prev, isOpen: false }))} className="flex-1 py-3 bg-slate-100 text-slate-700 rounded-xl font-bold">CANCEL</button><button onClick={deleteModal.onConfirm} className="flex-1 py-3 bg-red-500 text-white rounded-xl font-bold shadow-lg shadow-red-200">CONFIRM</button></div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
